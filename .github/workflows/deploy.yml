name: Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'app.py'
      - 'ingest_cli.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

env:
  IMAGE: ghcr.io/melu251/dok-assistent:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Schreibrecht auf ghcr.io
      actions: write    # Schreibrecht für Build-Cache

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # 1. Tailscale-Verbindung aufbauen (VPS ist nur via Tailscale erreichbar)
      #    Wichtig: native ssh/scp nutzen, nicht appleboy/* (laufen in Docker
      #    und haben keinen Zugriff auf das Tailscale-Interface des Runners)
      # -----------------------------------------------------------------
      - name: Mit Tailscale verbinden
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: --accept-routes --accept-dns

      - name: VPS-Erreichbarkeit prüfen
        run: nc -zv -w 10 ${{ secrets.VPS_HOST }} 22

      # -----------------------------------------------------------------
      # 2. SSH-Key für native ssh/scp vorbereiten
      # -----------------------------------------------------------------
      - name: SSH-Key einrichten
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # -----------------------------------------------------------------
      # 3. Docker-Image bauen und in GitHub Container Registry pushen
      # -----------------------------------------------------------------
      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei ghcr.io anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------
      # 4. Konfigurationsdateien auf den VPS kopieren (nativ, kein Docker)
      # -----------------------------------------------------------------
      - name: Dateien auf VPS kopieren
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /opt/dok-assistent"
          scp -i ~/.ssh/deploy_key \
            docker-compose.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/dok-assistent/

      # -----------------------------------------------------------------
      # 5. Auf VPS deployen: .env schreiben, Image pullen, Container starten
      # -----------------------------------------------------------------
      - name: Auf VPS deployen
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash << 'ENDSSH'
            set -e
            cd /opt/dok-assistent

            # .env aus den Secrets schreiben (wird nie ins Repo committed)
            cat > .env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OLLAMA_BASE_URL=${{ secrets.OLLAMA_BASE_URL }}
          OLLAMA_EMBED_MODEL=${{ secrets.OLLAMA_EMBED_MODEL }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          CHUNK_SIZE=${{ secrets.CHUNK_SIZE }}
          CHUNK_OVERLAP=${{ secrets.CHUNK_OVERLAP }}
          TOP_K_RESULTS=${{ secrets.TOP_K_RESULTS }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          CHAINLIT_AUTH_SECRET=${{ secrets.CHAINLIT_AUTH_SECRET }}
          CHAINLIT_USER=${{ secrets.CHAINLIT_USER }}
          CHAINLIT_PASSWORD=${{ secrets.CHAINLIT_PASSWORD }}
          EOF

            # Bei ghcr.io anmelden und neues Image holen
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u melu251 --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
          ENDSSH
